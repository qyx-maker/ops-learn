version: '3.8'

services:
  nginx:
    image: my-nginx:1.2
    container_name: nginx
    restart: always
    network_mode: host
    volumes:
     - /etc/localtime:/etc/localtime:ro
     - /dockerdemo1/ops-learn/nginx-backup/tomcat.conf:/etc/nginx/conf.d/tomcat.conf:ro
     - /dockerdemo1/ops-learn/nginx-backup/nginx.conf:/etc/nginx/nginx.conf:ro
     - /dockerdemo1/ops-learn/nginx-backup/default.conf:/etc/nginx/conf.d/default.conf:ro
